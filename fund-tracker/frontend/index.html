<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FundTrace — Financial Crime Tracking System</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="app">

  <aside class="sidebar">
    <div class="sidebar__crest">
      <div class="sidebar__crest-row">
        <svg class="crest-mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="19" stroke="#C8902E" stroke-width="1.2"/>
          <circle cx="20" cy="20" r="14.5" stroke="#C8902E" stroke-width="0.6" opacity="0.5"/>
          <path d="M20 9 L29 13.5 V21 C29 27 25 30.5 20 32 C15 30.5 11 27 11 21 V13.5 Z" stroke="#F7F6F2" stroke-width="1.1" fill="none"/>
          <path d="M16 20 L19 23 L25 16" stroke="#C8902E" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        <div>
          <div class="sidebar__title">FundTrace</div>
          <div class="sidebar__subtitle">Fraud Tracking System</div>
        </div>
      </div>
    </div>

    <nav class="sidebar__nav">
      <div class="nav-section-label">Overview</div>
      <div class="nav-item" data-view="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
        Dashboard
      </div>

      <div class="nav-section-label">Investigation</div>
      <div class="nav-item" data-view="accounts">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.5"/><path d="M5 21c0-4 3-6.5 7-6.5s7 2.5 7 6.5"/></svg>
        Account Registry
      </div>
      <div class="nav-item" data-view="transactions">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 7h11l-3-3M17 17H6l3 3"/></svg>
        Transaction Ledger
      </div>
      <div class="nav-item" data-view="graph">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="5" cy="6" r="2.2"/><circle cx="19" cy="6" r="2.2"/><circle cx="12" cy="18" r="2.2"/><path d="M7 7l8 9M17 7l-8 9M7 6h10"/></svg>
        Fund Flow Map
      </div>
      <div class="nav-item" data-view="cases">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6a2 2 0 012-2h4l2 2h6a2 2 0 012 2v9a2 2 0 01-2 2H6a2 2 0 01-2-2V6z"/></svg>
        Case Files
      </div>
    </nav>

    <div class="sidebar__footer">
      <div><span class="status-dot"></span>Demo environment — synthetic data</div>
      <div style="margin-top:6px;">v0.1 · Prototype build</div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar__breadcrumb">
        <span id="breadcrumb-text">Cyber Crime Cell &nbsp;/&nbsp; <b>Dashboard</b></span>
      </div>
      <div class="topbar__meta">
        <span class="classification-tag">DEMO · NON-OPERATIONAL</span>
        <span id="clock"></span>
      </div>
    </div>

    <div id="view-root" class="view"></div>
  </main>

</div>

<script src="/js/api.js"></script>
<script src="/js/graph.js"></script>
<script src="/js/views.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
